name: Setup Python environment
description: Set up Python, install uv, and install project dependencies

inputs:
  python-version:
    description: Python version to install
    required: false
    default: "3.12"
  cache-dependency-glob:
    description: Dependency files used to invalidate uv cache
    required: false
    default: requirements/requirements.in

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Cache Python dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/pip
          ~/.cache/uv
        key: ${{ runner.os }}-python-${{ inputs.python-version }}-${{ hashFiles(inputs.cache-dependency-glob) }}
        restore-keys: |
          ${{ runner.os }}-python-${{ inputs.python-version }}-
          ${{ runner.os }}-python-

    - name: Set up uv
      uses: astral-sh/setup-uv@v5
      with:
        cache-dependency-glob: ${{ inputs.cache-dependency-glob }}

    - name: Install dependencies
      shell: bash
      run: make install
