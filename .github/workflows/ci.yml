name: CI - Lint, Tests, Sonar, Security

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  lint-and-format:
    name: Lint and format check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python environment
        uses: ./.github/actions/setup-python-env

      - name: Run lint
        run: make lint

      - name: Run format check
        run: make format-check

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python environment
        uses: ./.github/actions/setup-python-env

      - name: Run unit tests
        run: make check-unit

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    env:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_PORT: 5432
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
    services:
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python environment
        uses: ./.github/actions/setup-python-env

      - name: Run integration tests
        run: make check-integration

  sonarcloud:
    name: SonarCloud analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >-
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.sources=app
            -Dsonar.tests=tests
            -Dsonar.coverage.exclusions=**
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300

  security-scan:
    name: Scan securite dependances
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python environment
        uses: ./.github/actions/setup-python-env

      - name: Scan for critical vulnerabilities
        run: make audit

  docker-build:
    name: Build image Docker
    runs-on: ubuntu-latest
    needs: [lint-and-format, unit-tests, integration-tests]
    env:
      IMAGE_BASE: ghcr.io/${{ github.repository }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Normalize image name
        id: repo
        run: |
          IMAGE_BASE=$(echo "${{ env.IMAGE_BASE }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_BASE=$IMAGE_BASE" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        run: |
          IMAGE=${{ steps.repo.outputs.IMAGE_BASE }}

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "TAGS=$IMAGE:pr-${{ github.event.pull_request.number }},$IMAGE:${{ github.sha }}" >> $GITHUB_OUTPUT
          else
            echo "TAGS=$IMAGE:${{ github.sha }},$IMAGE:latest" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
          tags: ${{ steps.meta.outputs.TAGS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max