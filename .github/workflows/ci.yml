name: CI

on:
  push:
  pull_request:

jobs:
  ci-minimal:
    name: Lint and tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: make install

      - name: Run lint
        run: make lint

      - name: Run tests
        run: make check
