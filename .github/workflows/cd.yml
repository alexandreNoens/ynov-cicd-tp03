name: CD

on:
  workflow_run:
    workflows: ["CI - Lint, Tests, Sonar, Security"]
    types:
      - completed

permissions:
  contents: read
  packages: read

jobs:
  deploy-staging:
    name: Deploy staging (fake)
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    # environment: staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set image name
        id: image
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]'):${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Pull image built in CI
        run: docker pull ${{ steps.image.outputs.IMAGE }}

      - name: Fake deploy to staging
        run: echo "Image ${{ steps.image.outputs.IMAGE }} deployed to staging"
