name: CD

on:
  workflow_run:
    workflows: ["CI - Lint, Tests, Sonar, Security"]
    types:
      - completed

permissions:
  contents: read
  packages: read

jobs:
  deploy-testing:
    name: Deploy testing
    runs-on: ubuntu-latest

    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Compute image
        id: image
        run: |
          IMAGE_BASE=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE=$IMAGE_BASE:${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: docker pull ${{ steps.image.outputs.IMAGE }}

      - name: Deploy to testing
        run: echo "Deploy ${{ steps.image.outputs.IMAGE }} to testing"

  deploy-production:
    name: Deploy production
    runs-on: ubuntu-latest

    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'master'

    steps:
      - name: Compute image
        id: image
        run: |
          IMAGE_BASE=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE=$IMAGE_BASE:${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: docker pull ${{ steps.image.outputs.IMAGE }}

      - name: Deploy to production
        run: echo "Deploy ${{ steps.image.outputs.IMAGE }} to production"